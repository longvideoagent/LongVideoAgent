site_name: LongVideoAgent Docs
site_description: Documentation for LongVideoAgent
repo_url: https://github.com/longvideoagent/LongVideoAgent
repo_name: longvideoagent/LongVideoAgent

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: training/quickstart.md
  - Dataset Processing:
      - Convert to Parquet: training/convert-to-parquet.md
  - Training:
      - GRPO: training/grpo-config-details.md
      - Offline Grounding Cache: training/offline-grounding-cache.md
      - LoRA Adapter Merge: training/lora-adapter-merge.md
  - Evaluation: evaluation.md

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
